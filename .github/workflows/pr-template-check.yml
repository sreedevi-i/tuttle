name: PR Template Check
on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-template:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR body contains Checklist section
        uses: actions/github-script@v7
        with:
          script: |
            const association = context.payload.pull_request.author_association;
            const trusted = ['MEMBER', 'OWNER', 'COLLABORATOR'];
            if (trusted.includes(association)) {
              core.info(`Skipping checklist check for ${association}: ${context.payload.pull_request.user.login}`);
              return;
            }

            const body = context.payload.pull_request.body || '';
            if (!body.includes('## Checklist')) {
              core.setFailed(
                'PR body is missing the "## Checklist" section. ' +
                'Please use the PR template when opening a pull request.'
              );
            }
