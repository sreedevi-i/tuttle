name: Pack Electron App

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  merge_group:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64

    steps:
    - uses: actions/checkout@v4

    # Linux: install tooling needed by electron-builder for deb/rpm targets
    - name: Install Linux packaging tools
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y rpm

    # Python sidecar
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name: Set up Python
      run: uv python install 3.13
    - name: Install Python dependencies
      run: uv sync --all-groups
    - name: Build Python sidecar (PyInstaller)
      run: uv run pyinstaller --clean --noconfirm tuttle-rpc.spec

    # Electron app
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
    - name: Install Electron dependencies
      run: npm ci
      working-directory: ui
    - name: Build Electron app
      run: npm run build
      working-directory: ui
    - name: Package Electron app (electron-builder)
      run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
      working-directory: ui
      env:
        CSC_IDENTITY_AUTO_DISCOVERY: "false"
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Artifacts (skip on merge-queue validation runs)
    - uses: actions/upload-artifact@v4
      if: github.event_name != 'merge_group'
      with:
        name: Tuttle-${{ github.ref_name }}-${{ matrix.platform }}
        path: ui/release/
