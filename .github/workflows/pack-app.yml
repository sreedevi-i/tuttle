name: Pack App

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    - name: Set up Python
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync --all-groups
    - name: Build app bundle
      run: uv run python scripts/pack_app.py
    - name: Create zip archive (Unix)
      if: runner.os != 'Windows'
      run: |
        cd dist
        zip -r ../Tuttle-${{ github.ref_name }}-${{ matrix.platform }}.zip .
    - name: Create zip archive (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Compress-Archive -Path dist\* -DestinationPath Tuttle-${{ github.ref_name }}-${{ matrix.platform }}.zip
    - uses: actions/upload-artifact@v4
      with:
        name: Tuttle-${{ github.ref_name }}-${{ matrix.platform }}
        path: dist/
    - name: Upload release asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: Tuttle-${{ github.ref_name }}-${{ matrix.platform }}.zip
